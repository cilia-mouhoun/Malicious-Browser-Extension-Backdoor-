<!DOCTYPE html>
<!--
  ============================================================================
  TypeSmart — Popup UI (popup.html)
  ============================================================================
  Owner   : Member 1 — UI & Legitimate Features
  Purpose : Browser-action popup — the main user-facing dashboard.
  Loads   : shared/constants.js, shared/schema.js, popup.js
  ============================================================================
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TypeSmart</title>
  <style>
    /* -----------------------------------------------------------------------
       Base styles — Member 1 should expand these into a polished design.
       These defaults ensure the popup is usable during development.
       ----------------------------------------------------------------------- */
    :root {
      --ts-bg:       #1a1a2e;
      --ts-surface:  #16213e;
      --ts-primary:  #0f3460;
      --ts-accent:   #e94560;
      --ts-text:     #eaeaea;
      --ts-muted:    #7a7a9e;
      --ts-radius:   8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      min-height: 400px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--ts-bg);
      color: var(--ts-text);
      padding: 16px;
    }
    header {
      text-align: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--ts-primary);
    }
    header h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--ts-accent);
    }
    header p {
      font-size: 12px;
      color: var(--ts-muted);
      margin-top: 4px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .stat-card {
      background: var(--ts-surface);
      border-radius: var(--ts-radius);
      padding: 14px 12px;
      text-align: center;
    }
    .stat-card .value {
      font-size: 24px;
      font-weight: 700;
      color: var(--ts-accent);
    }
    .stat-card .label {
      font-size: 11px;
      color: var(--ts-muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: var(--ts-radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s ease;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary {
      background: var(--ts-accent);
      color: #fff;
    }
    .btn-secondary {
      background: var(--ts-primary);
      color: var(--ts-text);
    }
    .btn-danger {
      background: transparent;
      color: var(--ts-accent);
      border: 1px solid var(--ts-accent);
    }
    footer {
      margin-top: 16px;
      text-align: center;
      font-size: 10px;
      color: var(--ts-muted);
    }
  </style>
</head>
<body>

  <!-- ======= Header ======= -->
  <header>
    <h1 id="app-title">TypeSmart</h1>
    <p id="app-tagline">Boost your typing productivity</p>
  </header>

  <!-- ======= Stats Dashboard ======= -->
  <section class="stats-grid" id="stats-section">
    <div class="stat-card">
      <div class="value" id="stat-words">0</div>
      <div class="label">Words Typed</div>
    </div>
    <div class="stat-card">
      <div class="value" id="stat-chars">0</div>
      <div class="label">Characters</div>
    </div>
    <div class="stat-card">
      <div class="value" id="stat-sessions">0</div>
      <div class="label">Sessions</div>
    </div>
    <div class="stat-card">
      <div class="value" id="stat-corrections">0</div>
      <div class="label">Auto-Corrections</div>
    </div>
  </section>

  <!-- ======= Action Buttons ======= -->
  <section class="actions">
    <button class="btn btn-primary" id="btn-export">📊 Export Typing Report</button>
    <button class="btn btn-secondary" id="btn-options">⚙️ Settings & Shortcuts</button>
    <button class="btn btn-danger" id="btn-clear">🗑️ Clear Typing Data</button>
  </section>

  <!-- ======= Footer ======= -->
  <footer>
    <p>TypeSmart v1.0.0 — University Security Module Project</p>
  </footer>

  <!-- ======= Scripts (order matters) ======= -->
  <script src="shared/constants.js"></script>
  <script src="shared/schema.js"></script>
  <script src="popup.js"></script>

</body>
</html>
